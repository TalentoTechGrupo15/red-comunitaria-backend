spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/red_comunitaria_talentotech15
    username: postgres
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 500
        order_inserts: true
        order_updates: true

server:
  port: 8080
  error:
    include-message: always